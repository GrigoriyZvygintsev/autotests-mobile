# ============================================================================
# CI/CD пайплайн для мобильных автотестов TalksApp
# ============================================================================
#
# Архитектура: 2 последовательных job'а (паттерн из autotests-api и autotests-ui):
#
#   Job 1 — run-tests:
#     Поднимает Android-эмулятор, запускает Appium Server 3.2,
#     прогоняет pytest-тесты и собирает результаты (allure-results + screenshots).
#
#   Job 2 — publish-report:
#     Скачивает allure-results из Job 1, генерирует HTML-отчёт с историей
#     и деплоит на GitHub Pages (ветка gh-pages).
#
# Результат: после каждого прогона по URL gh-pages доступен Allure-отчёт
# с историей запусков, графиками трендов и скриншотами упавших тестов.
# ============================================================================

# Имя workflow — отображается во вкладке "Actions" на GitHub
name: Mobile tests

# ============================================================================
# ТРИГГЕРЫ ЗАПУСКА
# ============================================================================
# Определяют, КОГДА запускается workflow.
# Используем 3 триггера для максимального покрытия:
on:

  # 1. push в main — срабатывает при:
  #    - Прямом push в ветку main
  #    - Merge PR в main (merge создаёт push-событие)
  #    Это основной триггер для "продового" прогона после вливания изменений.
  push:
    branches:
      - main  # Только ветка main, не срабатывает на feature-ветки

  # 2. pull_request в main — срабатывает при:
  #    - Открытии нового PR с target=main
  #    - Обновлении PR (новые коммиты в source-ветку)
  #    - Reopened PR
  #    Позволяет увидеть статус тестов ДО merge (зелёная/красная галочка в PR).
  pull_request:
    branches:
      - main  # Только PR'ы, которые вливаются в main

  # 3. workflow_dispatch — кнопка "Run workflow" в UI GitHub Actions.
  #    Позволяет запустить тесты вручную в любой момент.
  #    Полезно для:
  #    - Перезапуска после flaky-падения
  #    - Проверки после изменения инфраструктуры (обновление эмулятора и т.д.)
  #    - Демонстрации CI на докладе (нажимаем кнопку → видим прогон)
  workflow_dispatch:

# ============================================================================
# JOB 1: ЗАПУСК ТЕСТОВ
# ============================================================================
# Этот job выполняет всю "тяжёлую" работу:
# установка окружения → запуск эмулятора → Appium → pytest → сбор артефактов.
jobs:
  run-tests:
    # Запускаем на Ubuntu — стандартный runner для Android CI.
    # macos-latest тоже поддерживает эмулятор, но Ubuntu дешевле и быстрее.
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # Шаг 1: Клонируем репозиторий
      # ------------------------------------------------------------------
      # actions/checkout@v4 — стандартный action для клонирования репо.
      # Без него runner не имеет доступа к коду (requirements.txt, тестам и т.д.).
      - name: Check out repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Шаг 2: Устанавливаем Python 3.12
      # ------------------------------------------------------------------
      # Python нужен для:
      # - pip install зависимостей (Appium Python Client, pytest, allure)
      # - Запуска pytest
      # Версия 3.12 — актуальная стабильная, совпадает с autotests-api.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # Указываем конкретную мажорную версию

      # ------------------------------------------------------------------
      # Шаг 3: Устанавливаем JDK 17
      # ------------------------------------------------------------------
      # Java нужна для:
      # - Android SDK tools (emulator, adb, sdkmanager)
      # - UIAutomator2 driver (Java-based framework для Android-автоматизации)
      # Temurin — open-source дистрибутив JDK от Eclipse Adoptium.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'  # Дистрибутив JDK (Temurin = бывший AdoptOpenJDK)
          java-version: '17'      # LTS-версия, совместимая с Android SDK 34

      # ------------------------------------------------------------------
      # Шаг 4: Устанавливаем Node.js 20
      # ------------------------------------------------------------------
      # Node.js нужен для:
      # - npm install -g appium (Appium Server написан на Node.js)
      # - Установки драйверов через appium driver install
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # LTS-версия Node.js

      # ------------------------------------------------------------------
      # Шаг 5: Устанавливаем Appium Server + UiAutomator2 driver
      # ------------------------------------------------------------------
      # Appium Server 3.2 — центральный компонент мобильной автоматизации.
      # Принимает W3C WebDriver запросы от Python Client и транслирует их
      # в команды для UIAutomator2 на Android-устройстве.
      #
      # Цепочка: pytest → Appium Python Client → Appium Server → UiAutomator2 → Android
      #
      # appium driver install uiautomator2:
      #   Устанавливает драйвер для автоматизации Android через UIAutomator2 framework.
      #   UIAutomator2 — нативный Android-фреймворк от Google для UI-тестирования.
      - name: Install Appium Server and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # ------------------------------------------------------------------
      # Шаг 6: Устанавливаем Python-зависимости
      # ------------------------------------------------------------------
      # pip install -r requirements.txt устанавливает:
      # - Appium-Python-Client — клиент для общения с Appium Server
      # - pytest — тестовый раннер
      # - allure-pytest — генерация Allure results
      # - pydantic/pydantic-settings — конфигурация через .env
      # - Faker — генерация тестовых данных
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip  # Обновляем pip до последней версии
          pip install -r requirements.txt      # Устанавливаем зависимости проекта

      # ------------------------------------------------------------------
      # Шаг: Создаём папки для артефактов заранее
      # ------------------------------------------------------------------
      # Если эмулятор упадёт до запуска pytest, папка allure-results
      # не будет создана и upload-artifact не найдёт что загружать.
      # Создаём пустые папки заранее, чтобы артефакт загрузился в любом случае.
      - name: Create artifact directories
        run: |
          mkdir -p allure-results
          mkdir -p screenshots

      # ------------------------------------------------------------------
      # Шаг: Создаём .env для конфигурации тестов
      # ------------------------------------------------------------------
      # .env в .gitignore (содержит секреты локально), поэтому на CI
      # создаём его явно с нужными параметрами подключения.
      - name: Create .env config
        run: |
          echo 'APPIUM_SERVER.URL=http://127.0.0.1:4723' > .env
          echo 'ANDROID.PLATFORM_NAME=Android' >> .env
          echo 'ANDROID.AUTOMATION_NAME=UiAutomator2' >> .env
          echo 'ANDROID.DEVICE_NAME=emulator-5554' >> .env
          echo 'ANDROID.APP_PACKAGE=com.gzvyagintsev.talks' >> .env
          echo 'ANDROID.APP_ACTIVITY=.MainActivity' >> .env
          echo 'ANDROID.NO_RESET=true' >> .env
          echo "=== .env contents ==="
          cat .env
          echo "==="

      # ------------------------------------------------------------------
      # Шаг: Сборка APK TalksApp из исходников
      # ------------------------------------------------------------------
      # Клонируем репозиторий TalksApp и собираем debug APK прямо в CI.
      # APK будет установлен на эмулятор перед запуском тестов.
      - name: Build TalksApp APK
        run: |
          git clone --depth 1 https://github.com/GrigoriyZvygintsev/TalksApp.git /tmp/TalksApp
          cd /tmp/TalksApp
          chmod +x ./gradlew
          # sdkmanager на GitHub runner доступен по полному пути через ANDROID_HOME
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"
          ./gradlew assembleDebug --no-daemon --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/app-debug.apk
          echo "APK built successfully: $(ls -lh $GITHUB_WORKSPACE/app-debug.apk)"

      # ------------------------------------------------------------------
      # Шаг 7: Запуск тестов на Android-эмуляторе
      # ------------------------------------------------------------------
      # reactivecircus/android-emulator-runner@v2 — action, который:
      # 1. Скачивает Android SDK image (API 34, Google APIs, x86_64)
      # 2. Создаёт AVD (Android Virtual Device)
      # 3. Запускает эмулятор и ждёт полной загрузки
      # 4. Выполняет указанный script внутри среды с работающим эмулятором
      # 5. После завершения script останавливает эмулятор
      #
      # Параметры:
      #   api-level: 34 — Android 14 (последний стабильный API level)
      #   target: google_apis — образ с Google APIs (нужен для Google Play Services)
      #   arch: x86_64 — архитектура для аппаратного ускорения (KVM) на Ubuntu runner
      # Включаем KVM — аппаратное ускорение для Android-эмулятора.
      # Без KVM эмулятор работает на программной эмуляции и крайне медленно
      # загружается (или вообще не успевает за таймаут).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run mobile tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34       # Android 14 — целевой API level приложения TalksApp
          target: default      # default образ — легче и стабильнее google_apis на CI
          arch: x86_64         # x86_64 для KVM-ускорения на GitHub runner (Linux)
          # Опции эмулятора для headless CI:
          # -no-window: без GUI (нет дисплея на CI runner)
          # -gpu swiftshader_indirect: программный GPU-рендеринг (стабильно на CI)
          # -noaudio: без звука (нет звуковой карты)
          # -no-boot-anim: пропускает анимацию загрузки (экономит ~30 сек)
          # -no-snapshot-save: не сохранять snapshot при выходе
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            # Ждём полной загрузки устройства (boot_completed = 1)
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'

            # Устанавливаем APK TalksApp на эмулятор
            adb install $GITHUB_WORKSPACE/app-debug.apk
            echo "TalksApp installed. Packages:"
            adb shell pm list packages | grep gzvyagintsev

            # Запускаем Appium Server в фоновом режиме (&).
            # --relaxed-security разрешает небезопасные операции (скриншоты, shell-команды).
            # В CI это безопасно, т.к. эмулятор изолирован и уничтожается после прогона.
            appium --relaxed-security &

            # Ждём 5 секунд, пока Appium Server полностью запустится
            # и начнёт слушать на порту 4723.
            sleep 5

            # Запускаем pytest с фильтром по маркеру regression.
            # --alluredir=allure-results — папка для JSON-файлов Allure.
            # || true — не падаем, если тесты упали (артефакты нужны в любом случае).
            pytest -m regression --alluredir=allure-results || true

      # ------------------------------------------------------------------
      # Шаг 8: Загружаем Allure results как артефакт
      # ------------------------------------------------------------------
      # actions/upload-artifact@v4 сохраняет папку allure-results
      # как артефакт workflow. Это нужно для Job 2 (publish-report),
      # который скачает этот артефакт и сгенерирует HTML-отчёт.
      #
      # if: always() — загружаем артефакт ВСЕГДА, даже если тесты упали.
      # Без этого при падении тестов мы потеряли бы результаты.
      - name: Upload Allure results
        if: always()  # Выполнять даже при провале предыдущих шагов
        uses: actions/upload-artifact@v4
        with:
          name: allure-results   # Имя артефакта (используется в Job 2 для скачивания)
          path: allure-results   # Путь к папке с JSON-результатами Allure

      # ------------------------------------------------------------------
      # Шаг 9: Загружаем скриншоты как отдельный артефакт
      # ------------------------------------------------------------------
      # Скриншоты создаются автоматически при падении тестов
      # (hook pytest_runtest_makereport в conftest.py).
      # Загружаем отдельно для удобства — можно скачать без полного отчёта.
      - name: Upload screenshots
        if: always()  # Скриншоты особенно нужны при падениях
        uses: actions/upload-artifact@v4
        with:
          name: screenshots   # Имя артефакта
          path: screenshots   # Папка со скриншотами (PNG)

  # ============================================================================
  # JOB 2: ПУБЛИКАЦИЯ ALLURE-ОТЧЁТА
  # ============================================================================
  # Этот job:
  # 1. Скачивает allure-results из Job 1
  # 2. Подтягивает историю предыдущих прогонов из ветки gh-pages
  # 3. Генерирует HTML Allure-отчёт с графиками трендов
  # 4. Деплоит отчёт на GitHub Pages
  #
  # Результат: Allure-отчёт доступен по URL:
  # https://<username>.github.io/autotests-mobile/
  publish-report:
    # needs: run-tests — ждём завершения Job 1 перед началом.
    # Без этого Job 2 запустился бы параллельно и не нашёл артефактов.
    needs: run-tests

    # if: always() — запускаем ВСЕГДА, даже если Job 1 упал.
    # Нам нужен отчёт именно когда тесты падают (для анализа проблем).
    if: always()

    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # Шаг 1: Клонируем репозиторий (нужен для контекста actions)
      # ------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Шаг 2: Скачиваем Allure results из Job 1
      # ------------------------------------------------------------------
      # actions/download-artifact@v4 скачивает артефакт "allure-results",
      # загруженный в Job 1. Содержит JSON-файлы с результатами каждого теста.
      - name: Download Allure results
        uses: actions/download-artifact@v4
        continue-on-error: true  # Не падать, если артефакт не был создан (Job 1 упал рано)
        with:
          name: allure-results   # Имя артефакта (должно совпадать с upload)
          path: allure-results   # Куда распаковать

      # ------------------------------------------------------------------
      # Шаг 3: Подтягиваем историю Allure из ветки gh-pages
      # ------------------------------------------------------------------
      # Ветка gh-pages хранит предыдущие Allure-отчёты.
      # Allure использует эту историю для:
      # - Графиков трендов (pass/fail по прогонам)
      # - Retry-анализа (какие тесты стали нестабильными)
      # - Сравнения с предыдущим прогоном
      #
      # continue-on-error: true — если ветки gh-pages ещё нет
      # (первый прогон), не падаем. Allure создаст отчёт без истории.
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true  # Не падать, если gh-pages ещё не существует
        with:
          ref: gh-pages    # Ветка с историей Allure-отчётов
          path: gh-pages   # Локальная папка для клонирования

      # ------------------------------------------------------------------
      # Шаг 4: Генерируем HTML Allure-отчёт
      # ------------------------------------------------------------------
      # simple-elf/allure-report-action@v1.13 — action, который:
      # 1. Скачивает Allure CLI
      # 2. Копирует историю из предыдущих прогонов
      # 3. Запускает: allure generate allure-results -o allure-history --clean
      # 4. Результат: папка allure-history с полным HTML-отчётом
      - name: Generate Allure Report with history
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          allure_results: allure-results   # Входные данные: JSON-результаты тестов
          allure_history: allure-history   # Выходные данные: HTML-отчёт с историей

      # ------------------------------------------------------------------
      # Шаг 5: Деплоим отчёт на GitHub Pages
      # ------------------------------------------------------------------
      # peaceiris/actions-gh-pages@v4 — action для деплоя на GitHub Pages.
      # Берёт содержимое publish_dir и пушит в ветку publish_branch.
      #
      # github_token: ${{ secrets.GITHUB_TOKEN }} — автоматический токен,
      # который GitHub создаёт для каждого workflow run. Даёт права на push
      # в ветку gh-pages этого репозитория. Не нужно создавать вручную.
      #
      # После деплоя отчёт доступен по URL:
      # https://GrigoriyZvygintsev.github.io/autotests-mobile/
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # Автоматический токен GitHub
          publish_branch: gh-pages                    # Ветка для GitHub Pages
          publish_dir: allure-history                 # Папка с HTML-отчётом
