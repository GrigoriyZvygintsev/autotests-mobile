# CI/CD для мобильных тестов TalksApp.
#
# Паттерн 2-job аналогичен autotests-api и autotests-ui:
#   Job 1 (run-tests): Запускает тесты на Android-эмуляторе + собирает Allure results
#   Job 2 (publish-report): Генерирует Allure HTML отчёт и деплоит на GitHub Pages
#
# Особенности мобильного CI:
#   - Android-эмулятор через reactivecircus/android-emulator-runner
#   - Appium Server 3.2 + UiAutomator2 driver
#   - APK приложения TalksApp должен быть доступен (собирается или загружается)

name: Mobile tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js (для Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium Server and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # TODO: Добавить шаг сборки/загрузки APK TalksApp
      # - name: Download TalksApp APK
      #   run: ...

      - name: Run mobile tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          script: |
            # Запускаем Appium Server в фоне
            appium --relaxed-security &
            sleep 5

            # Запускаем тесты с генерацией Allure results
            pytest -m regression --alluredir=allure-results || true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots

  publish-report:
    needs: run-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report with history
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
