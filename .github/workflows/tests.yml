# ===========================================================================================================
# CI/CD пайплайн для мобильных автотестов TalksApp
# ===========================================================================================================
#
# Что делает этот workflow:
#   Автоматически прогоняет мобильные UI-тесты на Android-эмуляторе при каждом изменении кода
#   и публикует красивый Allure-отчёт на GitHub Pages.
#
# Архитектура — 2 последовательных job'а:
#
#   Job 1 «run-tests»:
#     Устанавливает окружение (Python, Java, Node.js, Appium) → поднимает Android-эмулятор →
#     собирает APK приложения TalksApp из исходников → устанавливает на эмулятор →
#     запускает Appium Server → прогоняет pytest → собирает артефакты (allure-results, скриншоты, логи).
#
#   Job 2 «publish-report»:
#     Скачивает allure-results из Job 1 → подтягивает историю предыдущих прогонов из ветки gh-pages →
#     генерирует HTML Allure-отчёт с графиками трендов → деплоит на GitHub Pages.
#
# Полная цепочка автоматизации:
#   pytest → Appium Python Client → Appium Server (Node.js) → UiAutomator2 driver → Android-эмулятор
#
# Результат: после каждого прогона на GitHub Pages доступен Allure-отчёт
# с историей запусков, графиками трендов и скриншотами упавших тестов.
#
# Два репозитория задействованы:
#   - autotests-mobile (этот репо) — тесты, Page Objects, CI pipeline
#   - TalksApp (внешний репо) — Jetpack Compose приложение, собирается в CI из исходников
# ===========================================================================================================

# Имя workflow — отображается во вкладке "Actions" на GitHub.
# Это человекочитаемое название, которое видно в UI GitHub → Actions → левая панель.
name: Mobile tests

# ===========================================================================================================
# ТРИГГЕРЫ ЗАПУСКА (on:)
# ===========================================================================================================
# Секция «on» определяет КОГДА запускается workflow.
# GitHub слушает указанные события и автоматически запускает workflow при их наступлении.
# Документация: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows
#
# Мы используем 3 триггера:
on:

  # Триггер 1: push в main
  # Срабатывает когда код попадает в ветку main:
  #   - Прямой push (git push origin main)
  #   - Merge Pull Request (merge создаёт push-событие автоматически)
  # Это основной триггер — после вливания изменений автоматически проверяем, что ничего не сломалось.
  # Фильтр branches: [main] — НЕ срабатывает на push в feature-ветки, только main.
  push:
    branches:
      - main

  # Триггер 2: pull_request в main
  # Срабатывает когда открывают/обновляют PR с целевой веткой main:
  #   - Открытие нового PR (opened)
  #   - Новые коммиты в source-ветку PR (synchronize)
  #   - Переоткрытие PR (reopened)
  # Позволяет увидеть результат тестов ДО merge — в PR появляется зелёная/красная галочка.
  # Это «защита main» — мержим только если тесты прошли.
  pull_request:
    branches:
      - main

  # Триггер 3: workflow_dispatch
  # Добавляет кнопку «Run workflow» в UI GitHub Actions (вкладка Actions → выбрать workflow → Run).
  # Позволяет запустить тесты вручную в любой момент без push/PR.
  # Когда полезно:
  #   - Перезапуск после случайного (flaky) падения
  #   - Проверка после изменений в инфраструктуре (обновление эмулятора, Appium и т.д.)
  #   - Проверка после изменений в TalksApp (CI клонирует свежий код приложения каждый раз)
  workflow_dispatch:

# ===========================================================================================================
# РАЗРЕШЕНИЯ ДЛЯ GITHUB_TOKEN (permissions:)
# ===========================================================================================================
# GITHUB_TOKEN — автоматический токен, который GitHub создаёт для каждого запуска workflow.
# С февраля 2023 по умолчанию он имеет read-only доступ (принцип минимальных привилегий).
#
# Нам нужно contents: write, потому что Job 2 делает git push в ветку gh-pages
# для публикации Allure-отчёта. Без write-доступа push упадёт с ошибкой 403.
permissions:
  contents: write

# ===========================================================================================================
# ОТМЕНА УСТАРЕВШИХ ЗАПУСКОВ (concurrency:)
# ===========================================================================================================
# Если быстро сделать 3 push'а подряд — GitHub запустит 3 параллельных workflow.
# concurrency группирует запуски по ключу (workflow + ветка) и отменяет предыдущий,
# если новый уже стартовал. Это экономит CI-минуты и не тратит ресурсы на устаревший код.
#
# Пример: push #1 запустился → push #2 → push #1 отменяется, #2 продолжает работать.
# group формируется из имени workflow + ref (ветка), так что разные ветки не мешают друг другу.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ===========================================================================================================
# JOB 1: ЗАПУСК ТЕСТОВ
# ===========================================================================================================
# Этот job — главная рабочая лошадка пайплайна. Выполняет полный цикл:
#   1. Установка инструментов (Python, Java, Node.js, Appium)
#   2. Сборка APK приложения из исходников
#   3. Запуск Android-эмулятора
#   4. Установка APK на эмулятор
#   5. Запуск Appium Server
#   6. Прогон pytest-тестов
#   7. Сбор артефактов (allure-results, скриншоты, логи)
#
# Почему столько шагов установки?
#   Каждый GitHub Actions runner — чистая виртуальная машина. На ней предустановлены
#   базовые инструменты, но конкретные версии Python/Java/Node нужно указать явно.
#   Каждый setup-* action скачивает и кэширует нужную версию.
# ===========================================================================================================
jobs:
  run-tests:
    # runs-on: определяет ТИП виртуальной машины (runner), на которой запустится job.
    # ubuntu-latest — стандартный Linux runner. Для Android CI это лучший выбор:
    #   - Поддерживает KVM (аппаратное ускорение эмулятора)
    #   - Дешевле macos-latest (macOS runner стоит 10x дороже по CI-минутам)
    #   - Быстрее стартует
    runs-on: ubuntu-latest

    # timeout-minutes: защита от зависания. По умолчанию GitHub даёт 6 часов (!).
    # Если эмулятор зависнет или Appium не ответит — job будет убит через 30 минут,
    # а не через 6 часов. Экономит CI-минуты и нервы.
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      # ШАГ 1: Клонирование репозитория
      # -----------------------------------------------------------------------
      # actions/checkout@v4 — стандартный action для клонирования репозитория на runner.
      # Без него runner — пустая машина без доступа к коду (requirements.txt, тестам и т.д.).
      # По умолчанию клонирует текущий коммит, который вызвал workflow.
      - name: Check out repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # ШАГ 2: Установка Python 3.12
      # -----------------------------------------------------------------------
      # Зачем: Python — язык наших тестов. Нужен для pip install и запуска pytest.
      # actions/setup-python@v5 скачивает указанную версию Python и добавляет в PATH.
      # Без этого шага будет использоваться системный Python (версия не гарантирована).
      # Версия 3.12 — актуальная стабильная, совпадает с окружением autotests-api.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # -----------------------------------------------------------------------
      # ШАГ 3: Установка JDK 17
      # -----------------------------------------------------------------------
      # Зачем: Java нужна для двух вещей:
      #   1. Android SDK tools (emulator, adb, sdkmanager) — написаны на Java
      #   2. UiAutomator2 driver — Java-based фреймворк для Android UI-автоматизации
      #   3. Gradle (сборка APK TalksApp) — тоже работает на JVM
      # Temurin — open-source дистрибутив JDK от Eclipse Adoptium (бывший AdoptOpenJDK).
      # JDK 17 — LTS-версия, совместимая с Android SDK 34 и Gradle 8.x.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # -----------------------------------------------------------------------
      # ШАГ 4: Установка Node.js 20
      # -----------------------------------------------------------------------
      # Зачем: Appium Server написан на Node.js, устанавливается через npm.
      # Также через npm ставятся драйверы (appium driver install).
      # Node.js 20 — текущая LTS-версия с долгосрочной поддержкой.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -----------------------------------------------------------------------
      # ШАГ 5: Установка Appium Server + UiAutomator2 driver
      # -----------------------------------------------------------------------
      # Appium Server — центральный компонент мобильной автоматизации.
      # Это HTTP-сервер, который принимает W3C WebDriver запросы от нашего Python Client
      # и транслирует их в нативные команды для устройства.
      #
      # Полная цепочка взаимодействия:
      #   pytest → Appium-Python-Client (HTTP) → Appium Server → UiAutomator2 → Android
      #
      # UiAutomator2 — нативный Android-фреймворк от Google для UI-тестирования.
      # Appium использует его как «мост» для взаимодействия с Android UI.
      # npm install -g: устанавливает глобально (доступен из любой директории).
      - name: Install Appium Server and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # -----------------------------------------------------------------------
      # ШАГ 6: Установка Python-зависимостей
      # -----------------------------------------------------------------------
      # pip install -r requirements.txt устанавливает все пакеты из файла зависимостей:
      #   - Appium-Python-Client — Python-клиент для общения с Appium Server
      #   - pytest — тестовый фреймворк (раннер + assertions + fixtures)
      #   - allure-pytest — плагин для генерации Allure results (JSON-файлы)
      #   - pydantic-settings — загрузка конфигурации из .env файла
      #   - python-dotenv — чтение .env переменных окружения
      # --upgrade pip: обновляем менеджер пакетов до последней версии (избегаем багов старых версий).
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # ШАГ 7: Создание директорий для артефактов
      # -----------------------------------------------------------------------
      # Зачем создавать заранее? Если эмулятор упадёт ДО запуска pytest,
      # папки allure-results и screenshots не будут созданы. Тогда шаг upload-artifact
      # не найдёт что загружать и упадёт (или создаст пустой артефакт).
      # mkdir -p: создаёт папку, не падая если она уже существует.
      - name: Create artifact directories
        run: |
          mkdir -p allure-results
          mkdir -p screenshots

      # -----------------------------------------------------------------------
      # ШАГ 8: Создание .env конфигурации для тестов
      # -----------------------------------------------------------------------
      # Файл .env содержит настройки подключения к Appium и эмулятору.
      # Он в .gitignore (локально может содержать другие настройки), поэтому на CI
      # создаём его заново с нужными значениями.
      #
      # Формат «СЕКЦИЯ.КЛЮЧ=значение» — это pydantic-settings с env_nested_delimiter=".":
      #   ANDROID.DEVICE_NAME → config.android.device_name
      #   APPIUM_SERVER.URL   → config.appium_server.url
      #
      # ВАЖНО: NO_RESET=false — каждый тест получает ЧИСТЫЙ запуск приложения.
      # При NO_RESET=true Appium не перезапускает приложение между тестами,
      # и навигационное состояние «утекает» из одного теста в другой.
      # Подробнее: BUGS.md → BUG-002.
      - name: Create .env config
        run: |
          echo 'APPIUM_SERVER.URL=http://127.0.0.1:4723' > .env
          echo 'ANDROID.PLATFORM_NAME=Android' >> .env
          echo 'ANDROID.AUTOMATION_NAME=UiAutomator2' >> .env
          echo 'ANDROID.DEVICE_NAME=emulator-5554' >> .env
          echo 'ANDROID.APP_PACKAGE=com.gzvyagintsev.talks' >> .env
          echo 'ANDROID.APP_ACTIVITY=.MainActivity' >> .env
          echo 'ANDROID.NO_RESET=false' >> .env
          echo "=== .env contents ==="
          cat .env
          echo "==="

      # -----------------------------------------------------------------------
      # ШАГ 9: Сборка APK TalksApp из исходников
      # -----------------------------------------------------------------------
      # TalksApp — отдельный репозиторий с Jetpack Compose приложением.
      # CI каждый раз клонирует свежий код и собирает APK из main ветки.
      #
      # Это означает:
      #   - Изменения в TalksApp АВТОМАТИЧЕСКИ попадают в CI без коммита в тестовом репо
      #   - Если в TalksApp переименуют testTag — тесты сломаются
      #   - Нет версионирования APK — всегда собирается latest из main
      #
      # git clone --depth 1: «shallow clone» — скачивает только последний коммит (быстрее).
      # sdkmanager --licenses: принимает лицензии Android SDK (|| true — не падать если уже приняты).
      # gradlew assembleDebug: собирает debug-вариант APK (без подписи, быстрее release).
      # --no-daemon: не запускать Gradle daemon (на CI одноразовая сборка, daemon не нужен).
      # --stacktrace: выводить полный стектрейс при ошибке сборки (для дебага).
      - name: Build TalksApp APK
        run: |
          git clone --depth 1 https://github.com/GrigoriyZvygintsev/TalksApp.git /tmp/TalksApp
          cd /tmp/TalksApp
          chmod +x ./gradlew
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"
          ./gradlew assembleDebug --no-daemon --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/app-debug.apk
          echo "APK built successfully: $(ls -lh $GITHUB_WORKSPACE/app-debug.apk)"

      # -----------------------------------------------------------------------
      # ШАГ 10: Включение KVM (аппаратное ускорение эмулятора)
      # -----------------------------------------------------------------------
      # KVM (Kernel-based Virtual Machine) — технология аппаратной виртуализации Linux.
      # Без KVM Android-эмулятор работает на ПРОГРАММНОЙ эмуляции и крайне медленно
      # загружается (5-10 минут вместо 30-60 секунд), или вообще не укладывается в таймаут.
      #
      # На GitHub runner KVM доступен, но по умолчанию права доступа к /dev/kvm ограничены.
      # Эти команды создают udev-правило, которое разрешает всем пользователям доступ к KVM.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # -----------------------------------------------------------------------
      # ШАГ 11: Запуск тестов на Android-эмуляторе
      # -----------------------------------------------------------------------
      # reactivecircus/android-emulator-runner@v2 — GitHub Action, который:
      #   1. Скачивает Android system image (API 34, x86_64)
      #   2. Создаёт AVD (Android Virtual Device) — виртуальный телефон
      #   3. Запускает эмулятор и ждёт полной загрузки (boot_completed)
      #   4. Выполняет наш script с уже работающим эмулятором
      #   5. После завершения script — останавливает эмулятор
      #
      # Параметры эмулятора:
      #   api-level: 34      — Android 14 (целевой API level TalksApp)
      #   target: default     — AOSP-образ (без Google APIs). Легче и стабильнее на CI.
      #                         google_apis нужен только если приложение использует Google Services.
      #   arch: x86_64        — архитектура процессора. x86_64 + KVM = быстрый эмулятор.
      #                         ARM-образы на x86-хосте работают через трансляцию (очень медленно).
      #   emulator-boot-timeout: 600  — 10 минут на загрузку (CI runner может быть нагружен).
      #   disable-spellchecker: true  — отключает spellchecker Android (стабильнее на CI).
      #
      # Опции эмулятора (-no-window и т.д.) — настройки для headless режима:
      #   -no-window             — без графического окна (на CI нет монитора)
      #   -gpu swiftshader_indirect — программный GPU-рендеринг (аппаратный GPU недоступен на CI)
      #   -noaudio               — без звуковой подсистемы (на CI нет звуковой карты)
      #   -no-boot-anim          — пропустить анимацию загрузки Android (экономит ~30 сек)
      #   -no-snapshot-load/save — не использовать snapshots (каждый запуск — чистый)
      - name: Run mobile tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          emulator-boot-timeout: 600
          disable-spellchecker: true
          emulator-options: -no-snapshot-load -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim

          # -------------------------------------------------------------------
          # СКРИПТ ЗАПУСКА ТЕСТОВ
          # -------------------------------------------------------------------
          # Этот скрипт выполняется ВНУТРИ среды с уже работающим эмулятором.
          # Он делает 5 вещей по порядку:
          #   1. Ждёт полной загрузки Android (sys.boot_completed)
          #   2. Запускает сбор логов устройства (adb logcat)
          #   3. Устанавливает APK приложения на эмулятор
          #   4. Запускает Appium Server в фоне
          #   5. Запускает pytest
          #
          # cleanup() — функция для корректной остановки фоновых процессов.
          # trap cleanup EXIT — вызывает cleanup() при ЛЮБОМ завершении скрипта
          # (успех, ошибка, сигнал). Гарантирует, что logcat и Appium будут остановлены.
          #
          # ВАЖНО: В конце стоит «|| true» после pytest, «cleanup; trap - EXIT; exit 0».
          # Это нужно потому что:
          #   - pytest возвращает exit code 1 при падении тестов
          #   - bash -Eeuo pipefail прерывает скрипт при любом ненулевом exit code
          #   - Но нам нужно ПРОДОЛЖИТЬ (собрать артефакты), даже если тесты упали
          #   - «|| true» превращает ненулевой exit code в 0
          #   - Явный «exit 0» гарантирует успешный exit code шага
          #   - Без этого GitHub Actions считает весь job failed и артефакты могут не загрузиться
          # Подробнее: BUGS.md → обсуждение exit code.
          script: |
            set -Eeuo pipefail

            # --- Переменные для PID фоновых процессов ---
            APPIUM_PID=""
            LOGCAT_PID=""

            # --- Функция очистки: останавливает фоновые процессы ---
            cleanup() {
              echo "=== Очистка фоновых процессов ==="
              if [ -n "${LOGCAT_PID:-}" ]; then kill "$LOGCAT_PID" 2>/dev/null || true; fi
              if [ -n "${APPIUM_PID:-}" ]; then kill "$APPIUM_PID" 2>/dev/null || true; fi
              pkill -f appium 2>/dev/null || true
            }

            # При любом завершении скрипта — вызвать cleanup
            trap cleanup EXIT

            # --- 1. Ожидание полной загрузки Android ---
            # reactivecircus/android-emulator-runner уже ждёт загрузку,
            # но дополнительная проверка sys.boot_completed — страховка.
            adb wait-for-device
            BOOT_TIMEOUT=240
            START_TS=$(date +%s)
            while [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do
              NOW_TS=$(date +%s)
              if [ $((NOW_TS - START_TS)) -ge "$BOOT_TIMEOUT" ]; then
                echo "ОШИБКА: Эмулятор не загрузился за ${BOOT_TIMEOUT} секунд"
                exit 1
              fi
              sleep 2
            done
            echo "Эмулятор загружен"

            # --- 2. Запуск logcat в фоне (логи Android-устройства) ---
            # logcat пишет ВСЕ системные логи устройства в файл.
            # Полезно для дебага: если тест упал — можно посмотреть, что происходило на устройстве.
            # & — запуск в фоне, $! — PID последнего фонового процесса.
            adb logcat -v time > "$GITHUB_WORKSPACE/logcat.txt" &
            LOGCAT_PID=$!

            # --- 3. Установка APK на эмулятор ---
            adb install "$GITHUB_WORKSPACE/app-debug.apk"
            echo "TalksApp installed. Packages:"
            adb shell pm list packages | grep gzvyagintsev || echo "ВНИМАНИЕ: пакет TalksApp не найден!"

            # --- 4. Запуск Appium Server в фоне ---
            # --relaxed-security: разрешает «небезопасные» команды (adb shell и т.д.).
            #   На CI это безопасно, т.к. runner одноразовый.
            # --log: пишет логи сервера в файл (загружается как артефакт для дебага).
            appium --relaxed-security --log "$GITHUB_WORKSPACE/appium.log" &
            APPIUM_PID=$!

            # Ожидание запуска Appium Server (опрос /status каждые 2 секунды, макс. 60 сек)
            echo "Ожидание запуска Appium Server..."
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:4723/status > /dev/null 2>&1; then
                echo "Appium Server готов!"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ОШИБКА: Appium Server не запустился за 60 секунд"
                exit 1
              fi
              sleep 2
            done

            # --- 5. Запуск тестов ---
            # -m regression: запускать только тесты с маркером @pytest.mark.regression
            # --alluredir: папка для JSON-результатов Allure
            # || true: НЕ прерывать скрипт если тесты упали (нужно собрать артефакты)
            pytest -m regression --alluredir=allure-results || true

            # Явная очистка и выход с кодом 0
            # Без этого bash -Eeuo pipefail может вернуть ненулевой exit code
            cleanup
            trap - EXIT
            exit 0

      # -----------------------------------------------------------------------
      # ШАГ 12: Загрузка Allure results как артефакт
      # -----------------------------------------------------------------------
      # actions/upload-artifact@v4 — сохраняет файлы с runner'а как «артефакт» workflow.
      # Артефакт — это архив файлов, который:
      #   - Можно скачать из UI GitHub Actions (вкладка Artifacts)
      #   - Можно передать в другой job через download-artifact (именно так Job 2 получает результаты)
      #   - Хранится 90 дней по умолчанию
      #
      # if: always() — КРИТИЧЕСКИ ВАЖНО. Без этого шаг выполняется только при success.
      #   Но артефакты нужны ИМЕННО когда тесты падают (чтобы анализировать проблему).
      #   always() = выполнять независимо от результата предыдущих шагов.
      #
      # if-no-files-found: ignore — не падать если папка пустая.
      #   Такое возможно если эмулятор упал до запуска pytest.
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # ШАГ 13: Загрузка скриншотов как отдельный артефакт
      # -----------------------------------------------------------------------
      # Скриншоты снимаются автоматически при падении тестов
      # (реализовано через pytest hook pytest_runtest_makereport в conftest.py).
      # Загружаем отдельным артефактом — можно скачать и посмотреть скриншоты
      # без разворачивания полного Allure-отчёта.
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # ШАГ 14: Загрузка логов Appium и logcat
      # -----------------------------------------------------------------------
      # Два ключевых лог-файла для дебага CI-падений:
      #   - appium.log — логи Appium Server (команды, ошибки драйвера, сессии)
      #   - logcat.txt — логи Android-устройства (крэши приложения, системные события)
      # Без этих логов при падении тестов в CI невозможно понять, что пошло не так
      # на стороне сервера или устройства. Используется синтаксис YAML multiline (|)
      # для указания нескольких путей.
      - name: Upload Appium and logcat logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            appium.log
            logcat.txt
          if-no-files-found: ignore

  # ===========================================================================================================
  # JOB 2: ПУБЛИКАЦИЯ ALLURE-ОТЧЁТА НА GITHUB PAGES
  # ===========================================================================================================
  # Этот job берёт «сырые» JSON-результаты тестов из Job 1 и превращает их
  # в красивый HTML Allure-отчёт с историей всех прогонов.
  #
  # Allure Report содержит:
  #   - Список всех тестов с результатами (passed/failed/broken)
  #   - Скриншоты и page source при падениях (прикреплены к каждому тесту)
  #   - Графики трендов — как менялась стабильность тестов по прогонам
  #   - Retry-анализ — какие тесты стали «flaky» (нестабильными)
  #   - Сравнение с предыдущим прогоном (new failures, fixes)
  #
  # Результат доступен по URL:
  #   https://GrigoriyZvygintsev.github.io/autotests-mobile/
  # ===========================================================================================================
  publish-report:
    # needs: run-tests — ЗАВИСИМОСТЬ между job'ами.
    # Job 2 запустится ТОЛЬКО после завершения Job 1.
    # Без этого оба job'а стартовали бы параллельно, и Job 2 не нашёл бы артефактов.
    needs: run-tests

    # if: always() — запускать Job 2 ВСЕГДА, даже если Job 1 упал (тесты failed).
    # Нам нужен отчёт ИМЕННО когда тесты падают — для анализа проблем.
    # Без always() при падении Job 1 → Job 2 не запустился бы → отчёт не обновился.
    if: always()

    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Шаг 1: Клонирование репозитория
      # -----------------------------------------------------------------------
      # Нужен для корректной работы последующих actions (контекст репозитория).
      - name: Check out repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Шаг 2: Скачивание Allure results из Job 1
      # -----------------------------------------------------------------------
      # actions/download-artifact@v4 — обратная сторона upload-artifact.
      # Скачивает артефакт «allure-results» (JSON-файлы с результатами каждого теста),
      # который был загружен в Job 1. Имя артефакта (name) должно совпадать.
      #
      # continue-on-error: true — если Job 1 упал до создания артефакта (например,
      # эмулятор не запустился), не ломаем Job 2. Allure создаст пустой отчёт.
      - name: Download Allure results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results
          path: allure-results

      # -----------------------------------------------------------------------
      # Шаг 3: Получение истории Allure из ветки gh-pages
      # -----------------------------------------------------------------------
      # Ветка gh-pages хранит ПРЕДЫДУЩИЕ Allure-отчёты.
      # Allure CLI использует эту историю для построения:
      #   - Графиков трендов (pass/fail по прогонам за всё время)
      #   - Retry-анализа (какие тесты стали нестабильными)
      #   - Сравнения «was/now» — что изменилось с прошлого прогона
      #
      # Обратите внимание: второй вызов actions/checkout@v4 в одном job'е!
      # Первый клонирует main (код), второй — gh-pages (историю) в отдельную папку.
      # Параметр path: gh-pages — клонирует НЕ в рабочую директорию, а в подпапку.
      #
      # continue-on-error: true — при самом первом запуске ветки gh-pages ещё не существует.
      # Allure просто создаст отчёт без истории.
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # -----------------------------------------------------------------------
      # Шаг 4: Генерация HTML Allure-отчёта
      # -----------------------------------------------------------------------
      # simple-elf/allure-report-action@v1.13 — action, который:
      #   1. Скачивает Allure CLI (Java-приложение для генерации отчётов)
      #   2. Копирует историю из gh-pages в allure-results/history
      #   3. Запускает: allure generate allure-results -o allure-history --clean
      #   4. Результат: папка allure-history с полным статическим HTML-сайтом
      #
      # allure_results: откуда брать JSON-данные тестов (вход)
      # allure_history: куда положить готовый HTML-отчёт (выход)
      - name: Generate Allure Report with history
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history

      # -----------------------------------------------------------------------
      # Шаг 5: Деплой отчёта на GitHub Pages
      # -----------------------------------------------------------------------
      # peaceiris/actions-gh-pages@v4 — action для публикации статических файлов
      # на GitHub Pages. Берёт содержимое publish_dir и пушит в ветку publish_branch.
      #
      # Как это работает:
      #   1. Action берёт файлы из allure-history/
      #   2. Создаёт коммит с этими файлами
      #   3. Пушит в ветку gh-pages
      #   4. GitHub Pages автоматически хостит содержимое этой ветки
      #
      # github_token: ${{ secrets.GITHUB_TOKEN }}
      #   Автоматический токен, который GitHub создаёт для каждого workflow run.
      #   Даёт права на push в ветку gh-pages этого репозитория.
      #   НЕ нужно создавать вручную — GitHub генерирует его автоматически.
      #   Требует permissions: contents: write (настроено выше в permissions:).
      #
      # После деплоя отчёт доступен:
      #   https://GrigoriyZvygintsev.github.io/autotests-mobile/
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
